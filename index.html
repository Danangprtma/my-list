<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ultra Anime & Reading Tracker</title>
<style>
:root{
--bg:#0f172a;
--card:#020617;
--text:white;
--accent:#6366f1;
}
body.light{
--bg:#f1f5f9;
--card:white;
--text:#020617;
}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}
header{background:var(--card);padding:15px 20px;display:flex;justify-content:space-between;align-items:center}
button{background:var(--accent);color:white;border:none;padding:8px 12px;border-radius:8px;cursor:pointer}
input,select{padding:8px;border-radius:8px;border:none;background:#1e293b;color:white}
body.light input,body.light select{background:#e2e8f0;color:black}
.container{padding:20px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.card{background:var(--card);border-radius:10px;overflow:hidden;transition:.2s}
.card:hover{transform:scale(1.05)}
.cover{width:100%;height:250px;object-fit:cover}
.info{padding:10px}
.title{font-weight:bold;font-size:14px}
.meta{font-size:12px;opacity:.7}
.progressbar{height:5px;background:#334155;border-radius:6px;margin-top:6px}
.progress{height:5px;background:#22c55e}

section{margin-top:30px}
canvas{background:var(--card);padding:10px;border-radius:10px}

.profile{display:flex;gap:10px;align-items:center}
.avatar{width:35px;height:35px;border-radius:50%;background:#6366f1;display:flex;align-items:center;justify-content:center}

.login{max-width:320px;margin:80px auto;text-align:center}
.login input{width:100%;margin-bottom:10px}

.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
</style>
</head>
<body>

<header>
<h2>🎬 Ultra Media Tracker</h2>
<div class="profile" id="profile"></div>
</header>

<div id="loginPage" class="login">
<h2>Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">
<div class="container">

<div class="toolbar">
<input id="searchAnime" placeholder="Search database...">
<select id="mediaType">
<option value="Anime">Anime</option>
<option value="Donghua">Donghua</option>
<option value="Manga">Manga</option>
<option value="Manhwa">Manhwa</option>
<option value="Manhua">Manhua</option>
<option value="Novel">Novel</option>
</select>
<button onclick="toggleTheme()">🌗 Theme</button>
</div>

<section>
<h3>🔎 Hasil Pencarian</h3>
<div id="searchResults" class="grid"></div>
</section>

<section>
<h3>📚 Library Kamu</h3>
<div id="library" class="grid"></div>
</section>

<section>
<h3>📊 Statistik Media</h3>
<canvas id="stats" height="140"></canvas>
</section>

<section>
<h3>📺 Anime Airing</h3>
<div id="airing" class="grid"></div>
</section>

<section>
<h3>🧠 Rekomendasi Anime</h3>
<div id="recommend" class="grid"></div>
</section>

</div>
</div>

<script>
let currentUser=null
let library=[]

function save(){
localStorage.setItem("lib-"+currentUser,JSON.stringify(library))
}

function load(){
library=JSON.parse(localStorage.getItem("lib-"+currentUser)||"[]")
}

function login(){
let u=username.value
if(!u)return alert("Masukkan username")
currentUser=u
localStorage.setItem("user",u)
start()
}

function start(){
currentUser=localStorage.getItem("user")
if(!currentUser)return
loginPage.style.display="none"
app.style.display="block"
profile.innerHTML=`<div class='avatar'>${currentUser[0].toUpperCase()}</div><div>${currentUser}</div>`
load()
renderLibrary()
loadAiring()
updateStats()
updateAI()
}

async function searchAnime(q){
const query=`query ($search: String){Page(perPage:8){media(search:$search){title{romaji}coverImage{large}episodes genres}}}`
let res=await fetch("https://graphql.anilist.co",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({query,variables:{search:q}})})
let json=await res.json()
return json.data.Page.media
}

searchAnimeInput=document.getElementById("searchAnime")

searchAnimeInput.addEventListener("input",async()=>{
let q=searchAnimeInput.value
if(q.length<3)return
let results=await searchAnime(q)
searchResults.innerHTML=""

results.forEach(a=>{
let card=document.createElement("div")
card.className="card"
card.innerHTML=`
<img class="cover" src="${a.coverImage.large}">
<div class="info">
<div class="title">${a.title.romaji}</div>
<button onclick='addMedia(${JSON.stringify(a).replace(/'/g,"&apos;")})'>Tambah</button>
</div>`
searchResults.appendChild(card)
})
})

function addMedia(a){
let type=document.getElementById("mediaType").value
library.push({
 title:a.title.romaji,
 cover:a.coverImage.large,
 total:a.episodes||0,
 watched:0,
 genre:a.genres?.[0]||"",
 type:type
})

save()
renderLibrary()
updateStats()
updateAI()
notify(type+" ditambahkan: "+a.title.romaji)
}

function renderLibrary(){
libraryEl=document.getElementById("library")
libraryEl.innerHTML=""

library.forEach(a=>{
let p=a.total?Math.min(100,(a.watched/a.total)*100):0

let card=document.createElement("div")
card.className="card"
card.innerHTML=`
<img class="cover" src="${a.cover}">
<div class="info">
<div class="title">${a.title}</div>
<div class="meta">${a.type}</div>
<div class="meta">${a.watched}/${a.total||"?"}</div>
<div class="progressbar"><div class="progress" style="width:${p}%"></div></div>
<button onclick="watchEpisode('${a.title}')">+Progress</button>
</div>`

libraryEl.appendChild(card)
})
}

function watchEpisode(title){
let a=library.find(x=>x.title===title)
a.watched++
save()
renderLibrary()
updateStats()
}

async function loadAiring(){
const query=`{Page(perPage:8){airingSchedules(notYetAired:true){media{title{romaji}coverImage{large}}}}}`
let res=await fetch("https://graphql.anilist.co",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({query})})
let json=await res.json()

airing.innerHTML=""
json.data.Page.airingSchedules.forEach(a=>{
let m=a.media
let card=document.createElement("div")
card.className="card"
card.innerHTML=`<img class="cover" src="${m.coverImage.large}"><div class="info"><div class="title">${m.title.romaji}</div></div>`
airing.appendChild(card)
})
}

function updateStats(){
let ctx=stats.getContext("2d")
ctx.clearRect(0,0,stats.width,stats.height)

let types=["Anime","Donghua","Manga","Manhwa","Manhua","Novel"]
let values=types.map(t=>library.filter(x=>x.type===t).length)

values.forEach((v,i)=>{
let x=40+i*80
let h=v*15
ctx.fillStyle="#6366f1"
ctx.fillRect(x,120-h,40,h)
ctx.fillStyle="white"
ctx.fillText(types[i],x,135)
ctx.fillText(v,x+10,115-h)
})
}

async function updateAI(){
if(!library.length)return
let genre=library[library.length-1].genre

const query=`query($genre:String){Page(perPage:6){media(genre:$genre,type:ANIME){title{romaji}coverImage{large}}}}`
let res=await fetch("https://graphql.anilist.co",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({query,variables:{genre}})})
let json=await res.json()

recommend.innerHTML=""
json.data.Page.media.forEach(a=>{
let card=document.createElement("div")
card.className="card"
card.innerHTML=`<img class="cover" src="${a.coverImage.large}"><div class="info"><div class="title">${a.title.romaji}</div></div>`
recommend.appendChild(card)
})
}

function toggleTheme(){
document.body.classList.toggle("light")
}

function notify(msg){
if(Notification.permission==="granted"){
new Notification(msg)
}else if(Notification.permission!=="denied"){
Notification.requestPermission()
}
}

start()
</script>

</body>
</html>
